<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2430"/>
      <stop offset="1" stop-color="#171b24"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .term     { fill: #d8dee9; }
      .muted    { fill: #6b7488; }
      .prompt   { fill: #88c0d0; font-weight: 600; }
      .you      { fill: #ebcb8b; font-weight: 700; }
      .claude   { fill: #a3be8c; font-weight: 700; }
      .accent   { fill: #b48ead; }
      .blue     { fill: #81a1c1; }
      .yellow   { fill: #ebcb8b; }
      .green    { fill: #a3be8c; }
      .pink     { fill: #b48ead; }
      .h        { fill: #88c0d0; font-weight: 700; }
      .cmd      { fill: #eceff4; }
      .sep      { fill: #4c566a; }
    </style>
  </defs>

  <!-- window -->
  <rect x="20" y="20" width="840" height="480" rx="12" ry="12" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- title bar -->
  <rect x="20" y="20" width="840" height="34" rx="12" ry="12" fill="#252b37"/>
  <rect x="20" y="40" width="840" height="14" fill="#252b37"/>
  <circle cx="42" cy="37" r="6" fill="#ff5f56"/>
  <circle cx="62" cy="37" r="6" fill="#ffbd2e"/>
  <circle cx="82" cy="37" r="6" fill="#27c93f"/>
  <text x="440" y="42" text-anchor="middle" class="muted" font-size="12">web3-docs · MCP · stdio</text>

  <!-- content -->
  <g transform="translate(44 84)">
    <!-- $ install -->
    <text x="0" y="0"><tspan class="prompt">$</tspan> <tspan class="cmd">claude mcp add web3-docs -- uvx --from git+https://github.com/dioptx/web3-docs web3-docs-mcp</tspan></text>
    <text x="0" y="22" class="green">✔ Added MCP server "web3-docs" (stdio)</text>

    <!-- separator -->
    <line x1="0" y1="44" x2="780" y2="44" stroke="#2e3440" stroke-width="1"/>

    <!-- conversation -->
    <text x="0" y="72"><tspan class="you">You</tspan>  <tspan class="term">What fork shipped PUSH0 and why was it added?</tspan></text>

    <text x="0" y="100"><tspan class="claude">Claude</tspan>  <tspan class="muted">→ resolve_proposal("PUSH0")</tspan></text>
    <text x="0" y="120" class="muted">         → query_protocol_docs("eip-3855", query="rationale")</text>

    <!-- result block -->
    <rect x="0" y="138" width="780" height="178" rx="8" ry="8" fill="#1a1f2a" stroke="#2e3440"/>
    <text x="16" y="162"><tspan class="h">eip-3855</tspan> <tspan class="muted">— PUSH0 instruction</tspan></text>
    <text x="16" y="184">
      <tspan class="muted">chain:</tspan> <tspan class="blue">ethereum</tspan>
      <tspan class="muted">  type:</tspan> <tspan class="pink">Standards Track</tspan>
      <tspan class="muted">  status:</tspan> <tspan class="green">Final</tspan>
    </text>
    <text x="16" y="204">
      <tspan class="muted">fork:</tspan> <tspan class="yellow">Shanghai</tspan>
      <tspan class="muted">  activated:</tspan> <tspan class="term">2023-04-12</tspan>
    </text>
    <text x="16" y="222" class="sep">───────────────────────────────────────────────────────</text>
    <text x="16" y="246" class="term">Many uses of PUSH1 0x00 to push the constant zero account</text>
    <text x="16" y="266" class="term">for ~11% of all bytecode in deployed contracts. Adding a</text>
    <text x="16" y="286" class="term">dedicated PUSH0 opcode reduces contract size and saves</text>
    <text x="16" y="306" class="term">2 gas per byte plus 3 gas per execution at call time.</text>

    <!-- footer -->
    <text x="0" y="346" class="muted">11 protocol-spec sources · 1,767 proposals · 19 contract registries · SQLite + FTS5</text>
    <text x="0" y="368"><tspan class="prompt">›</tspan> <tspan class="term">Try: "Show me Cosmos ADR-001"  ·  "Uniswap router on Base"  ·  "Which BIPs activated with Taproot"</tspan></text>
  </g>
</svg>
